name: Android APK

# Builds the Capacitor Android app. On tags, the APK is attached to the
# GitHub Release next to MimicConduit.exe.
# Note: this produces a debug-signed APK (installable on any phone with
# "unknown sources" enabled). For Play Store / F-Droid distribution, add a
# release keystore as repository secrets and a signing step.
# No paths filter: it can prevent tag pushes from triggering, and the APK
# must always be attached to tagged releases.
on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build web UI and sync Capacitor
        working-directory: web
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Restore signing keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          # Strip any whitespace/newlines that sneak in when secrets are pasted.
          printf '%s' "$KS_B64" | tr -d '[:space:]' | base64 -d > $HOME/release.keystore
          PW="$(printf '%s' "$KS_PASSWORD" | tr -d '[:space:]')"
          ALIAS="$(printf '%s' "$KS_ALIAS" | tr -d '[:space:]')"
          echo "ANDROID_KEYSTORE_PATH=$HOME/release.keystore" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=$PW" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=$ALIAS" >> $GITHUB_ENV

      - name: Verify keystore and password
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "keystore sha256 : $(sha256sum $HOME/release.keystore | cut -d' ' -f1)"
          echo "password length : ${#ANDROID_KEYSTORE_PASSWORD} (expected: 32)"
          echo "password sha256 : $(printf '%s' "$ANDROID_KEYSTORE_PASSWORD" | sha256sum | cut -d' ' -f1)"
          echo "                  (expected: 00969ced415a2b1f791aeccfb7e4d99cab7bf14d65c1e424820ca9e609608bef)"
          echo "alias length    : ${#ANDROID_KEY_ALIAS} (expected: 5)"
          echo "--- keytool output:"
          if ! keytool -list -keystore "$HOME/release.keystore" -storepass "$ANDROID_KEYSTORE_PASSWORD"; then
            echo "::error::Keystore/password check failed — see keytool output above."
            exit 1
          fi
          echo "Keystore check: OK"

      - name: Build APK (signed release if keystore configured, else debug)
        working-directory: web/android
        run: |
          if [ "$HAS_KEYSTORE" = "true" ]; then
            ./gradlew assembleRelease
            cp app/build/outputs/apk/release/app-release.apk ../../Mimic.apk
          else
            ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk ../../Mimic.apk
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mimic-apk
          path: Mimic.apk

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Mimic.apk
