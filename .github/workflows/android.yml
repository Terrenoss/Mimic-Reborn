name: Android APK

# Builds the Capacitor Android app. On tags, the APK is attached to the
# GitHub Release next to MimicConduit.exe.
# Note: this produces a debug-signed APK (installable on any phone with
# "unknown sources" enabled). For Play Store / F-Droid distribution, add a
# release keystore as repository secrets and a signing step.
on:
  push:
    branches: [master, reborn]
    paths: ["web/**", ".github/workflows/android.yml"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build web UI and sync Capacitor
        working-directory: web
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Build APK
        working-directory: web/android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp web/android/app/build/outputs/apk/debug/app-debug.apk Mimic.apk

      - uses: actions/upload-artifact@v4
        with:
          name: mimic-apk
          path: Mimic.apk

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Mimic.apk
